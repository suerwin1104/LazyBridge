
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test_report.md</title>
    <style>
:root {
    --primary: #38bdf8;
    --bg: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --text: #f8fafc;
}
body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%), 
        radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0, transparent 50%);
}
.container {
    max-width: 1000px;
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
}
h1, h2, h3 { color: var(--primary); }
a { color: #60A5FA; text-decoration: none; border-bottom: 1px dotted #60A5FA; }
code { background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
pre { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; overflow-x: auto; }
img { max-width: 100%; border-radius: 12px; }
</style>
</head>
<body>
    <div class="container">
        <h1>測試報告</h1>
<p>這是一個測試 Markdown 轉換為網頁的範例。</p>
<ul>
<li>優點 1</li>
<li>優點 2</li>
</ul>
    </div>
</body>
</html>
